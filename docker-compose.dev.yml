services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      target: development
    container_name: backend_service_dev
    restart: unless-stopped
    env_file:
      - .env.development
    environment:
      # Database Configuration (overrides from .env.development)
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      
      # Redis Configuration (overrides from .env.development)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # Server Configuration
      NODE_ENV: development
      PORT: 5000
      
      # Application URLs (from .env.development)
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL:-${APP_URL}}
      CORS_ORIGIN: ${CORS_ORIGIN}
      
      # JWT Configuration (from .env.development)
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      
      # Email Configuration (from .env.development)
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME}
      
      # Rate Limiting (from .env.development)
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      
      # Redis Password (from .env.development)
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      # Mount source code for hot reloading (read-write for development)
      - ./backend/auth_module/src:/app/auth_module/src:rw
      - ./backend/package.json:/app/package.json:ro
      - ./backend/tsconfig.json:/app/tsconfig.json:ro
      - ./backend/prisma:/app/prisma:rw
      - ./backend/scripts:/app/scripts:ro
      - ./backend/nodemon.json:/app/nodemon.json:ro
      - ./backend/app.ts:/app/app.ts:ro
      - ./backend/server.ts:/app/server.ts:ro
      # Exclude node_modules from volume mount
      - /app/node_modules
      # Mount logs directory for development debugging
      - ./backend/volumes/logs:/app/logs:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_network_dev
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: backend_postgres_dev
    restart: unless-stopped
    env_file:
      - .env.development
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - backend_network_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: backend_redis_dev
    restart: unless-stopped
    env_file:
      - .env.development
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - backend_network_dev
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  prisma-studio:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      target: development
    container_name: prisma_studio_dev
    restart: unless-stopped
    env_file:
      - .env.development
    environment:
      # Database Configuration (same as backend)
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      # Prisma Studio Configuration
      PRISMA_STUDIO_PORT: ${PRISMA_STUDIO_PORT:-5555}
    ports:
      - "${PRISMA_STUDIO_PORT:-5555}:5555"
    volumes:
      # Mount Prisma schema for Studio
      - ./backend/prisma:/app/prisma:ro
      # Mount package.json for Prisma CLI
      - ./backend/package.json:/app/package.json:ro
      # Exclude node_modules - will be generated in container
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend_network_dev
    command: ["sh", "-c", "npx prisma generate && npx prisma studio --hostname 0.0.0.0 --port 5555"]

volumes:
  postgres_data_dev:
    driver: local
  redis_data_dev:
    driver: local

networks:
  backend_network_dev:
    driver: bridge

