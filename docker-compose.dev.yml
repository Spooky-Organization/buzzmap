name: buzzmap-dev

networks:
  buzzmap-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
  backend_node_modules:
  frontend_node_modules:

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONTEND_BIND_HOST}:${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env.dev
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    networks:
      - buzzmap-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${FRONTEND_PORT} || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "${BACKEND_BIND_HOST}:${BACKEND_PORT}:${BACKEND_PORT}"
    command: ["npm", "run", "dev"]
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./backend/package.json:/app/package.json
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    networks:
      - buzzmap-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${BACKEND_PORT}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    ports:
      - "${DATABASE_BIND_HOST}:${DATABASE_PORT}:${DATABASE_INTERNAL_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buzzmap-network

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_BIND_HOST}:${REDIS_PORT}:${REDIS_INTERNAL_PORT}"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buzzmap-network

  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - "${STORAGE_BIND_HOST}:${STORAGE_PORT}:${STORAGE_PORT}"
      - "${STORAGE_CONSOLE_BIND_HOST}:${STORAGE_CONSOLE_PORT}:${STORAGE_CONSOLE_PORT}"
    volumes:
      - rustfs_data:/data
    environment:
      RUSTFS_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${STORAGE_SECRET_KEY}
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: ":${STORAGE_PORT}"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: ":${STORAGE_CONSOLE_PORT}"
      RUSTFS_CORS_ALLOWED_ORIGINS: "*"
    command: ["/data"]
    networks:
      - buzzmap-network
