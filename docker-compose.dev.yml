services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      target: development
    container_name: buzzmap_frontend_dev
    restart: unless-stopped
    env_file:
      - .env.development
    environment:
      # Frontend Configuration
      NODE_ENV: development
      # Note: VITE_* vars are available at runtime in dev mode
      # Browser accesses backend via exposed port (localhost:5000)
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_APP_NAME: ${VITE_APP_NAME}
      VITE_ENVIRONMENT: development
    ports:
      - "${FRONTEND_PORT}:3000"
    volumes:
      # Mount source code for hot reloading (read-write for development)
      - ./frontend/src:/app/src:rw
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json:ro
      - ./frontend/tailwind.config.js:/app/tailwind.config.js:ro
      - ./frontend/postcss.config.js:/app/postcss.config.js:ro
      - ./frontend/.eslintrc.cjs:/app/.eslintrc.cjs:ro
      - ./frontend/package.json:/app/package.json:ro
      - ./frontend/.env:/app/.env:ro
      # Exclude node_modules from volume mount
      - /app/node_modules
      # Exclude dist from volume mount
      - /app/dist
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - backend_network_dev
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      target: development
    container_name: buzzmap_backend_dev
    restart: unless-stopped
    env_file:
      - .env.development
    environment:
      # Database Configuration (overrides from .env.development)
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      
      # Redis Configuration (overrides from .env.development)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # Server Configuration
      NODE_ENV: development
      PORT: 5000
      
      # Application URLs (from .env.development)
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      
      # JWT Configuration (from .env.development)
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      
      # Email Configuration (from .env.development)
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME}
      
      # Rate Limiting (from .env.development)
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS}
      
      # Redis Password (from .env.development)
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "${BACKEND_PORT}:5000"
    volumes:
      # Mount source code for hot reloading (read-write for development)
      - ./backend/modules/auth_module/src:/app/modules/auth_module/src:rw
      - ./backend/core:/app/core:rw
      - ./backend/package.json:/app/package.json:ro
      - ./backend/tsconfig.json:/app/tsconfig.json:ro
      - ./backend/prisma:/app/prisma:rw
      - ./backend/scripts:/app/scripts:ro
      - ./backend/nodemon.json:/app/nodemon.json:ro
      # Exclude node_modules from volume mount
      - /app/node_modules
      # Mount logs directory for development debugging
      - ./backend/volumes/logs:/app/logs:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_network_dev
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: dashboard_postgres_dev
    restart: unless-stopped
    env_file:
      - .env.development
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - backend_network_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dashboard_redis_dev
    restart: unless-stopped
    env_file:
      - .env.development
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - backend_network_dev
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data_dev:
    driver: local
  redis_data_dev:
    driver: local

networks:
  backend_network_dev:
    driver: bridge

