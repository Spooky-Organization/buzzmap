services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      target: production
    container_name: backend_service_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Database Configuration (overrides from .env)
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      
      # Redis Configuration (overrides from .env)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # Server Configuration
      NODE_ENV: production
      PORT: 5000
      
      # Application URLs (from .env)
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL:-${APP_URL}}
      CORS_ORIGIN: ${CORS_ORIGIN}
      
      # JWT Configuration (from .env)
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      
      # Email Configuration (from .env)
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      RESEND_FROM_NAME: ${RESEND_FROM_NAME}
      
      # Rate Limiting (from .env)
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      
      # Redis Password (from .env)
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      # Production: Only mount necessary files, no source code (built into image)
      - ./backend/prisma:/app/prisma:ro
      - ./backend/volumes/logs:/app/logs:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_network_prod
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Production optimizations
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  postgres:
    image: postgres:15-alpine
    container_name: backend_postgres_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - backend_network_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Production optimizations
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: backend_redis_prod
    restart: unless-stopped
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data_prod:/data
    networks:
      - backend_network_prod
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    # Production optimizations
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  prisma-studio:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      target: production
    container_name: prisma_studio_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Database Configuration (same as backend)
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      # Prisma Studio Configuration
      PRISMA_STUDIO_PORT: ${PRISMA_STUDIO_PORT:-5555}
    ports:
      - "${PRISMA_STUDIO_PORT:-5555}:5555"
    volumes:
      # Mount Prisma schema for Studio
      - ./backend/prisma:/app/prisma:ro
      # Mount package.json for Prisma CLI
      - ./backend/package.json:/app/package.json:ro
      # Exclude node_modules - Prisma client already in image from build
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend_network_prod
    command: ["sh", "-c", "npx prisma generate && npx prisma studio --hostname 0.0.0.0 --port 5555"]
    # Production optimizations
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local

networks:
  backend_network_prod:
    driver: bridge

