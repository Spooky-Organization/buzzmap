name: buzzmap-prod

networks:
  buzzmap-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rustfs_data:

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "${FRONTEND_BIND_HOST}:${FRONTEND_PORT}:${FRONTEND_PORT}"
    env_file:
      - .env.prod
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - buzzmap-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:${FRONTEND_PORT}').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "${BACKEND_BIND_HOST}:${BACKEND_PORT}:${BACKEND_PORT}"
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - buzzmap-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:${BACKEND_PORT}/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buzzmap-network

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buzzmap-network

  rustfs:
    image: rustfs/rustfs:latest
    restart: always
    volumes:
      - rustfs_data:/data
    environment:
      RUSTFS_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${STORAGE_SECRET_KEY}
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: ":${STORAGE_PORT}"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: ":${STORAGE_CONSOLE_PORT}"
      RUSTFS_CORS_ALLOWED_ORIGINS: "*"
    command: ["/data"]
    networks:
      - buzzmap-network
