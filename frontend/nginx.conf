# Custom log format: client_ip is the real client (attacker) when behind Cloudflare/Coolify (real_ip module)
# After real_ip is applied, $remote_addr is the real client (attacker) IP
log_format security 'client_ip=$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"';

# Optional: treat requests from curl/wget as scanner for probe paths (used to avoid logging them)
map $http_user_agent $is_scanner_ua {
    default 0;
    "~*curl" 1;
    "~*wget" 1;
    ""       1;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Real client IP when behind reverse proxy (Cloudflare, Coolify). First IP in access log = attacker/client.
    real_ip_header X-Forwarded-For;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    # Add Cloudflare IPv4 ranges here if using Cloudflare: https://www.cloudflare.com/ips-v4

    access_log /dev/stdout security;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Block known scanner paths: return 404 and do not log (reduces noise and signal to probes)
    location ~ ^/api/(?!v1/).* {
        access_log off;
        return 404;
    }
    location ~ ^/(admin/upload|admin/files|admin/media|upload|upload/file|upload/image|fileupload|file-upload|uploadfile|import|v1/upload|v2/upload) {
        access_log off;
        return 404;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Handle React Router - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Disable access logs for favicon and robots.txt
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }
}

